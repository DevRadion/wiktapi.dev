services:
  api:
    build:
      context: .
      target: runtime
      args:
        PORT: ${PORT:-3000}
    image: ${API_IMAGE:-wiktapi-api}
    volumes:
      - ${DATA_VOLUME:-/mnt/volume-nbg1-1/data}:/data
    environment:
      DATA_PATH: ${DATA_PATH:-/data/wiktionary.db}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    labels:
      coolify.managed: "true"
      coolify.service: "wiktapi-api"

  worker:
    build:
      context: .
      target: worker
    image: ${WORKER_IMAGE:-wiktapi-worker}
    volumes:
      - ${DATA_VOLUME:-/mnt/volume-nbg1-1/data}:/data
    environment:
      DATA_DIR: ${DATA_DIR:-/data}
      DATA_PATH: ${DATA_PATH:-/data/wiktionary.db}
    profiles:
      - tools
    labels:
      coolify.managed: "true"
      coolify.service: "wiktapi-worker"
